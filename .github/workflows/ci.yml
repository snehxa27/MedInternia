name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '*.md'
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & Test Backend
        working-directory: backend
        run: |
          npm install
          npm run build --if-present
          npm test --if-present

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build --if-present
          npm test --if-present
